    <table border="0" width="900" align="center">

        <tr>
            <td>
                <img src="imagens/logo.png"/>

            <td align="right">

        <tr>

                <h2>Buscar Pacotes de Viagens</h2>

                <form>

                    Local de Partida:<br/>

                    <select name="origem">

                        <option>Teresina</option>
                        <option>São Paulo</option>
                        <option>Rio de Janeiro</option>
                        <option>Fortaleza</option>

                    </select>

                    <br/><br/>

                    <select name="destino">

                        <option>França</option>
                        <option>Itália</option>
                        <option>Rio de Janeiro</option>

                    </select>

                    <br/><br/>

                    <br/><br/>

                    Data de Retorno:<br/>
                    <input type="date" name="retorno">

                    <br/><br/>

                    </select>

                    Quantidade de Crianças:<br/>

                        <option>0</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>

                    </select>

                    <br/><br/>

                    Observações:<br/>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio HTML/CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 20px; 
        }

        .header {
            background-color: #4CAF50; /* Verde */
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
        }

        .main-container {
            display: flex;
            gap: 20px; 
            flex: 1; 
            margin-bottom: 20px;
        }

        .sidebar {
            background-color: #e0e0e0;
            width: 20%;
            padding: 20px;
            min-height: 150px;
        }

        .sidebar ul {
            list-style-position: inside; 
        }

        .content {
            background-color: #f5f5f5;
            width: 80%;
            padding: 20px;
        }

        .content p {
            margin-bottom: 15px;
        }

        .footer {
            background-color: #333333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>
    <td align="right">
                <a>Home</a> |
                <a href="index.html">Home</a> |
                <a href="index.html">Quem Somos</a> |
                <a href="index.html">Contato</a> |
                <a href="desafio.html">Desafio</a>
            </td>

    <div class="header">
        <h1>Minha Página Web</h1>
    </div>

    <div class="main-container">
        
        <div class="sidebar">
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </div>

        <div class="content">
            <p>Este é o conteúdo principal da página.</p>
            <p>Adicione mais parágrafos ou elementos conforme necessário.</p>
        </div>

    </div>

    <div class="footer">
        <p>Rodapé da Página</p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style type="text/css">
        .menu{
            background: #EEE685;
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            font-size: 18px;
            padding: 10px;
        }

        /* EFEITO SIMPLES: muda a cor de fundo ao passar o mouse */
        .menu:hover{
            background: #87CEFA;
        }

        a:link{ /*não visitados*/
            color: #b9c941;
            text-decoration: none;
        }

        a:visited{ /*visitados*/
            color: #458B00;
        }

        a:hover{ /*passar o mouse*/
            color: #8B4726;
        }

        a:active{ /*clicado*/
            color: #FF1493;
        }

        a{
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="menu">
        <a href="http://www.google.com">Google</a> |
        <a href="http://www.techtudo.com.br/">Tech tudo</a> |
        <a href="http://www.maujor.com">Maujor</a>
    </div>

</body>
</html>

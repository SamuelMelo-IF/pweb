<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style type="text/css">
        .menu{
            background: #EEE685;
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            font-size: 18px;
            padding: 10px;
        }

        a:link{ /*não visitados*/
            color: #b9c941;
            text-decoration: none;
        }

        a:visited{ /*visitados*/
            color: #458B00;
        }

        a:hover{ /*passar o mouse - muda a cor do texto E o fundo da palavra*/
            color: #8B4726;
            background: yellow; /* muda só o fundo da palavra */
        }

        a:active{ /*clicado*/
            color: #FF1493;
        }

        a{
            text-decoration: none;
        }
    </style>
</head>

<body>

    <nav class="menu">
        <a href="http://www.google.com">Google</a> |
        <a href="http://www.techtudo.com.br/">Tech tudo</a> |
        <a href="http://www.maujor.com">Maujor</a>
    </nav>

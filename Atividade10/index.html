<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style type="text/css">
        .menu{
            background: #EEE685;
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            font-size: 18px;
            padding: 10px;
        }

        a:link{ /*não visitados*/
            color: #b9c941;
            text-decoration: none;
        }

        a:visited{ /*visitados*/
            color: #458B00;
        }

        a:hover{ /*passar o mouse - muda a cor do texto E o fundo da palavra*/
            color: #8B4726;
            background: yellow; /* muda só o fundo da palavra */
        }

        a:active{ /*clicado*/
            color: #FF1493;
        }

        a{
            text-decoration: none;
        }

         body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }

        /* BoxModel do card */
        .card {
            width: 300px;
            border: 1px solid #ddd;
            padding: 0;
            margin: 20px;
            background: white;
            display: inline-block;
            vertical-align: top;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Header - balão colorido do portal */
        .card header {
            background: #1a237e;
            color: white;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px 8px 0 0;
        }

        /* Conteúdo do card */
        .conteudo {
            padding: 12px;
        }

        /* Imagem flutuante */
        .card img {
            float: left;
            width: 80px;
            margin-right: 10px;
            margin-bottom: 5px;
        }

        /* Texto da notícia */
        .card p {
            font-size: 13px;
            line-height: 1.4;
            margin: 0;
            color: #333;
        }

        /* Limpa o float */
        .clear {
            clear: both;
        }

        /* Footer - data */
        .card footer {
            background: #e0e0e0;
            padding: 6px 12px;
            font-size: 11px;
            color: #555;
            border-radius: 0 0 8px 8px;
        }

        nav {
            background: #333;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        nav a:hover {
            color: #ffcc00;
        }
    </style>
</head>

<body>

    <nav class="menu">
        <a href="http://www.google.com">Google</a> |
        <a href="http://www.techtudo.com.br/">Tech tudo</a> |
        <a href="http://www.maujor.com">Maujor</a>
    </nav>

    <header>
        <h1>Exemplo da tag Header</h1>
    </header>

    <footer>
        <p>Postado por: Fulano de Tal</p>
        <p>Contato: <a href="mailto:fulano@example.com">fulano@example.com</a>.</p>
    </footer>

    

</body>
</html>

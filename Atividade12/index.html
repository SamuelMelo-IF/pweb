<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 12 - Atributo Data</title>

    <style>
        .pessoa {
            color: red;
            cursor: pointer;
        }

        .pessoa[data-idade='30'] {
            color: blue;
        }

        .pessoa::before {
            content: 'Nome: ';
        }

        .pessoa::after {
            content: ' - Idade: ' attr(data-idade) ' Anos - C.P.F: ' attr(data-cpf);
        }
    </style>

    <script type="text/javascript">
    function mostravalor(componente){
        var nome = componente.firstChild.nodeValue; 
        alert("Atividade 12: " + nome);
    }
    </script>
</head>
<body>

    <h2>Lista de Pessoas</h2>

    <ul>
        <li class="pessoa" onclick="mostravalor(this)" data-idade="20" data-cpf="999">João</li>
        <li class="pessoa" onclick="mostravalor(this)" data-idade="30" data-cpf="888">José</li>
        <li class="pessoa" onclick="mostravalor(this)" data-idade="40" data-cpf="777">Maria</li>
    </ul>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style type="text/css">

        body{
            background: #61bd8c;
        }

        #conteudo{
            background: #FFFFFF;
            padding: 10px;
            width: 900px;
            margin: 30px auto;
        }

        .caixa{
            background: red;
            margin: 10px;
            width: 100px;
            height: 100px;
            color:#FFFFFF;
        }

        #Relativo{
            position: relative;
            left: 30px;
        }

        #Absoluto{
            position: absolute;
            left: 30px;
        }

        #Fixo{
            position: fixed;
            left: 200px;
            top: 0px;
        }

    </style>
</head>

<body>

    <body>

    <span>Conteiner body</span>

    <div id="conteudo">
        Conteiner div

        <div id="Relativo" class="caixa">
            Relativo
        </div>

        <div id="Absoluto" class="caixa">
            Absoluto
        </div>

        <div id="Fixo" class="caixa">
            Fixo
        </div>

    </div>

    <!-- DESAFIO 1 -->
    <div id="layout-header">

        <div class="header-fixo">
            HEADER
        </div>

        <div class="menu">
            MAIN MENU
        </div>

        <div class="left">
            LEFT
        </div>

        <div class="center">
            CENTER
        </div>

        <div class="right">
            RIGHT
        </div>

        <div class="footer">
            FOOTER
        </div>

    </div>

    <!-- DESAFIO 2 -->
    <div id="layout-sidebar">

        <div class="topo">
            MAIN MENU
        </div>

        <div class="header">
            HEADER
        </div>

        <div class="content">
            CONTENT
        </div>

        <div class="sidebar">
            SIDE BAR
        </div>

        <div class="footer2">
            FOOTER
        </div>

    </div>

</body>

</html>

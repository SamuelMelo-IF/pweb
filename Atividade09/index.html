<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style type="text/css">

        body{
            background: #61bd8c;
        }

        #conteudo{
            background: #FFFFFF;
            padding: 10px;
            width: 900px;
            margin-top: 30px;
        }

        .caixa{
            background: red;
            margin: 10px;
            width: 100px;
            height: 100px;
            color:#FFFFFF;
        }

        #Relativo{
            position: relative;
            left: 30px;
        }

        #Absoluto{
            position: absolute;
            left: 30px;
        }

        #Fixo{
            position: fixed;
            left: 200px;
            top: 0px;
        }

    </style>
</head>

<body>

    <span> Conteiner body</span>

    <div id="conteudo">
        Conteiner div

        <div id="Relativo" class="caixa">
            Relativo 
        </div>

        <div id="Absoluto" class="caixa">
            Absoluto 
        </div>

        <div id="Fixo" class="caixa">
            Fixo 
        </div>

    </div>

</body>

</html>
